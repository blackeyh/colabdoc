<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColabDoc</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
  a { color: #4f6ef7; text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Layout */
  #app { min-height: 100vh; }
  .page { display: none; padding: 2rem; max-width: 900px; margin: 0 auto; }
  .page.active { display: block; }

  /* Auth */
  .auth-box { background: #fff; border-radius: 8px; padding: 2rem; max-width: 400px; margin: 4rem auto; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  .auth-box h1 { margin-bottom: 1.5rem; font-size: 1.5rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; margin-bottom: .3rem; font-size: .9rem; color: #555; }
  .form-group input { width: 100%; padding: .6rem .8rem; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
  .btn { padding: .6rem 1.2rem; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; transition: background .15s; }
  .btn-primary { background: #4f6ef7; color: #fff; width: 100%; margin-top: .5rem; }
  .btn-primary:hover { background: #3a56d4; }
  .btn-primary:disabled { background: #a0aef8; cursor: not-allowed; }
  .btn-danger { background: #e74c3c; color: #fff; }
  .btn-danger:hover { background: #c0392b; }
  .btn-sm { padding: .3rem .7rem; font-size: .85rem; }
  .auth-link { margin-top: 1rem; text-align: center; font-size: .9rem; color: #777; }
  .error { color: #e74c3c; font-size: .85rem; margin-top: .5rem; }

  /* Dashboard */
  .topbar { background: #fff; border-bottom: 1px solid #e5e5e5; padding: .8rem 2rem; display: flex; justify-content: space-between; align-items: center; }
  .topbar h2 { font-size: 1.1rem; color: #4f6ef7; }
  .topbar-right { display: flex; align-items: center; gap: 1rem; font-size: .9rem; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; margin-top: 1.5rem; }
  .section-header h3 { font-size: 1.1rem; }
  .doc-list { display: grid; gap: .8rem; }
  .doc-card { background: #fff; border-radius: 6px; padding: 1rem 1.2rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: box-shadow .15s; }
  .doc-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.15); }
  .doc-card-title { font-weight: 600; }
  .doc-card-meta { font-size: .8rem; color: #888; margin-top: .2rem; }
  .doc-card-actions { display: flex; gap: .5rem; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; justify-content: center; align-items: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 8px; padding: 1.5rem; min-width: 340px; max-width: 500px; width: 100%; }
  .modal h3 { margin-bottom: 1rem; }
  .modal-actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1rem; }

  /* Editor */
  #editor-page { padding: 0; max-width: 100%; }
  .editor-bar { background: #fff; border-bottom: 1px solid #e5e5e5; padding: .6rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
  .editor-bar .back-btn { cursor: pointer; color: #4f6ef7; font-size: .9rem; white-space: nowrap; }
  .editor-bar .doc-title-input { border: none; font-size: 1.1rem; font-weight: 600; flex: 1; outline: none; padding: .2rem .4rem; border-radius: 4px; }
  .editor-bar .doc-title-input:focus { background: #f0f4ff; }
  .editor-bar .editor-status { font-size: .8rem; color: #888; white-space: nowrap; }

  .editor-body { display: flex; height: calc(100vh - 49px); }
  .editor-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .editor-textarea { flex: 1; resize: none; border: none; outline: none; padding: 2rem; font-size: 1rem; line-height: 1.7; font-family: inherit; background: #fafafa; }
  .editor-sidebar { width: 290px; flex-shrink: 0; border-left: 1px solid #e5e5e5; background: #fff; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1.2rem; }

  .sidebar-section h4 { font-size: .78rem; text-transform: uppercase; letter-spacing: .06em; color: #aaa; margin-bottom: .6rem; font-weight: 600; }
  .user-tag { display: inline-flex; align-items: center; gap: .4rem; background: #f0f4ff; border-radius: 4px; padding: .25rem .6rem; font-size: .85rem; margin-bottom: .3rem; }
  .user-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
  .perm-row { display: flex; align-items: center; justify-content: space-between; font-size: .85rem; margin-bottom: .4rem; gap: .4rem; }
  .perm-role { color: #666; font-size: .78rem; background: #f5f5f5; border-radius: 3px; padding: .1rem .4rem; }
  .version-row { font-size: .82rem; color: #555; margin-bottom: .4rem; display: flex; justify-content: space-between; align-items: center; }
  select { padding: .3rem .5rem; border: 1px solid #ddd; border-radius: 4px; font-size: .85rem; }
  input[type="text"], input[type="email"], input[type="password"] { font-size: 1rem; }

  /* AI Panel */
  .ai-panel { border: 1px solid #e0e7ff; border-radius: 8px; background: #fafbff; padding: .8rem; }
  .ai-panel-header { display: flex; align-items: center; gap: .4rem; margin-bottom: .7rem; }
  .ai-panel-header span { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #4f6ef7; }
  .ai-spark { font-size: 1rem; }

  .ai-idle { font-size: .82rem; color: #aaa; line-height: 1.5; }

  .ai-selection-preview { background: #fff; border: 1px solid #e0e7ff; border-radius: 5px; padding: .5rem .6rem; margin-bottom: .7rem; }
  .ai-selection-label { font-size: .72rem; color: #888; margin-bottom: .25rem; }
  .ai-selection-text { font-size: .82rem; color: #444; font-style: italic; line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .ai-word-count { font-size: .72rem; color: #aaa; margin-top: .25rem; }

  .ai-action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .4rem; margin-bottom: .6rem; }
  .ai-action-btn { background: #fff; border: 1px solid #d0d8ff; border-radius: 6px; padding: .4rem .3rem; cursor: pointer; font-size: .8rem; color: #3a56d4; font-weight: 500; transition: all .15s; text-align: center; line-height: 1.3; }
  .ai-action-btn:hover { background: #eef1ff; border-color: #4f6ef7; }
  .ai-action-btn:disabled { opacity: .5; cursor: not-allowed; }
  .ai-action-icon { display: block; font-size: 1.1rem; margin-bottom: .15rem; }

  .ai-loading { display: flex; align-items: center; gap: .5rem; font-size: .83rem; color: #4f6ef7; padding: .4rem 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 14px; height: 14px; border: 2px solid #d0d8ff; border-top-color: #4f6ef7; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }

  .ai-result-label { font-size: .72rem; color: #888; margin-bottom: .3rem; display: flex; justify-content: space-between; align-items: center; }
  .ai-result-action-badge { background: #e0e7ff; color: #3a56d4; border-radius: 3px; padding: .1rem .4rem; font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .ai-suggestion-box { background: #fff; border: 1px solid #c8d4ff; border-radius: 5px; padding: .55rem .65rem; font-size: .83rem; color: #222; line-height: 1.55; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; margin-bottom: .6rem; }
  .ai-result-btns { display: flex; gap: .4rem; }
  .ai-result-btns button { flex: 1; padding: .38rem; font-size: .82rem; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; transition: background .15s; }
  .ai-accept-btn { background: #4f6ef7; color: #fff; }
  .ai-accept-btn:hover { background: #3a56d4; }
  .ai-reject-btn { background: #f5f5f5; color: #555; border: 1px solid #ddd !important; }
  .ai-reject-btn:hover { background: #eee; }
  .ai-error { background: #fff5f5; border: 1px solid #fca5a5; border-radius: 5px; padding: .45rem .6rem; font-size: .82rem; color: #dc2626; margin-top: .4rem; }
</style>
</head>
<body>
<div id="app">

  <!-- LOGIN PAGE -->
  <div id="login-page" class="page">
    <div class="auth-box">
      <h1>ColabDoc</h1>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <div class="error" id="login-error"></div>
      <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
      <div class="auth-link">No account? <a href="#" onclick="showPage('register-page')">Sign up</a></div>
    </div>
  </div>

  <!-- REGISTER PAGE -->
  <div id="register-page" class="page">
    <div class="auth-box">
      <h1>Create Account</h1>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="reg-name" placeholder="John Doe">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="••••••••">
      </div>
      <div class="error" id="reg-error"></div>
      <button class="btn btn-primary" onclick="doRegister()">Sign Up</button>
      <div class="auth-link">Already have an account? <a href="#" onclick="showPage('login-page')">Sign in</a></div>
    </div>
  </div>

  <!-- DASHBOARD PAGE -->
  <div id="dashboard-page" class="page">
    <div class="topbar">
      <h2>ColabDoc</h2>
      <div class="topbar-right">
        <span id="user-name-display"></span>
        <button class="btn btn-sm btn-danger" onclick="doLogout()">Sign out</button>
      </div>
    </div>
    <div style="padding:1.5rem">
      <div class="section-header">
        <h3>My Documents</h3>
        <button class="btn btn-primary btn-sm" style="width:auto" onclick="openNewDocModal()">+ New Document</button>
      </div>
      <div class="doc-list" id="doc-list">
        <div style="color:#888;font-size:.9rem">Loading…</div>
      </div>
    </div>
  </div>

  <!-- EDITOR PAGE -->
  <div id="editor-page" class="page">
    <div class="editor-bar">
      <span class="back-btn" onclick="goBack()">← Back</span>
      <input class="doc-title-input" id="editor-title" type="text" placeholder="Document title" onblur="saveTitle()">
      <span class="editor-status" id="editor-status">Saved</span>
      <button class="btn btn-sm" onclick="saveVersion()" style="white-space:nowrap">Save Version</button>
    </div>
    <div class="editor-body">
      <div class="editor-main">
        <textarea
          class="editor-textarea"
          id="editor-content"
          placeholder="Start writing… Select any text to use the AI assistant →"
          oninput="onContentChange()"
          onmouseup="checkAISelection()"
          onkeyup="checkAISelection()"
        ></textarea>
      </div>
      <div class="editor-sidebar">

        <!-- AI ASSISTANT -->
        <div class="sidebar-section">
          <div class="ai-panel">
            <div class="ai-panel-header">
              <span class="ai-spark">✦</span>
              <span>AI Assistant</span>
            </div>

            <!-- Idle: no selection -->
            <div id="ai-idle" class="ai-idle">
              Select any text in the editor, then choose an action below.
            </div>

            <!-- Selection preview -->
            <div id="ai-selection-preview" style="display:none">
              <div class="ai-selection-preview">
                <div class="ai-selection-label">Selected text</div>
                <div class="ai-selection-text" id="ai-selection-text"></div>
                <div class="ai-word-count" id="ai-word-count"></div>
              </div>
              <div class="ai-action-grid" id="ai-action-grid">
                <button class="ai-action-btn" onclick="callAI('rewrite')">
                  <span class="ai-action-icon">✏️</span>Rewrite
                </button>
                <button class="ai-action-btn" onclick="callAI('summarize')">
                  <span class="ai-action-icon">📝</span>Summarize
                </button>
                <button class="ai-action-btn" onclick="callAI('translate')">
                  <span class="ai-action-icon">🌐</span>Translate
                </button>
                <button class="ai-action-btn" onclick="callAI('restructure')">
                  <span class="ai-action-icon">🔀</span>Restructure
                </button>
              </div>
            </div>

            <!-- Loading -->
            <div id="ai-loading" style="display:none">
              <div class="ai-loading">
                <div class="spinner"></div>
                <span id="ai-loading-label">AI is thinking…</span>
              </div>
            </div>

            <!-- Result -->
            <div id="ai-result" style="display:none">
              <div class="ai-result-label">
                <span>Suggestion</span>
                <span class="ai-result-action-badge" id="ai-result-badge"></span>
              </div>
              <div class="ai-suggestion-box" id="ai-suggestion-text"></div>
              <div class="ai-result-btns">
                <button class="ai-accept-btn" onclick="acceptAI()">✓ Accept</button>
                <button class="ai-reject-btn" onclick="rejectAI()">✗ Reject</button>
              </div>
            </div>

            <!-- Error -->
            <div id="ai-error" style="display:none" class="ai-error"></div>
          </div>
        </div>

        <!-- ACTIVE USERS -->
        <div class="sidebar-section">
          <h4>Active Users</h4>
          <div id="active-users"></div>
        </div>

        <!-- PERMISSIONS -->
        <div class="sidebar-section">
          <h4>Permissions</h4>
          <div id="perm-list"></div>
          <div id="add-perm-section" style="display:none;margin-top:.5rem">
            <div class="form-group" style="margin-bottom:.5rem;position:relative">
              <input type="text" id="perm-search" placeholder="Search by name or email" style="width:100%;padding:.4rem;border:1px solid #ddd;border-radius:4px;font-size:.85rem" oninput="searchUsers(this.value)">
              <div id="user-search-results" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:4px;z-index:10;max-height:150px;overflow-y:auto;box-shadow:0 2px 8px rgba(0,0,0,.1)"></div>
            </div>
            <div id="selected-user-display" style="display:none;font-size:.85rem;background:#f0f4ff;border-radius:4px;padding:.3rem .6rem;margin-bottom:.5rem;justify-content:space-between;align-items:center">
              <span id="selected-user-label"></span>
              <span style="cursor:pointer;color:#aaa" onclick="clearSelectedUser()">✕</span>
            </div>
            <input type="hidden" id="perm-user-id">
            <div class="form-group" style="margin-bottom:.5rem">
              <select id="perm-role" style="width:100%">
                <option value="editor">Editor</option>
                <option value="commenter">Commenter</option>
                <option value="viewer">Viewer</option>
              </select>
            </div>
            <button class="btn btn-primary btn-sm" style="width:100%" onclick="grantPermission()">Add User</button>
            <div class="error" id="perm-error"></div>
          </div>
        </div>

        <!-- VERSIONS -->
        <div class="sidebar-section">
          <h4>Versions</h4>
          <div id="version-list"></div>
        </div>

      </div>
    </div>
  </div>

</div>

<!-- New Document Modal -->
<div class="modal-overlay" id="new-doc-modal">
  <div class="modal">
    <h3>New Document</h3>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="new-doc-title" placeholder="My Document">
    </div>
    <div class="error" id="new-doc-error"></div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal('new-doc-modal')">Cancel</button>
      <button class="btn btn-sm btn-primary" style="width:auto" onclick="createDocument()">Create</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const API = window.location.origin;
let token = localStorage.getItem("token");
let currentUser = JSON.parse(localStorage.getItem("user") || "null");
let currentDoc = null;
let currentDocRole = null;
let ws = null;
let wsReconnectTimer = null;
let saveTimer = null;

// ─── Helpers ─────────────────────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function openModal(id) { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }
function esc(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

async function apiFetch(path, opts = {}) {
  const headers = { "Content-Type": "application/json", ...(token ? { Authorization: `Bearer ${token}` } : {}) };
  const res = await fetch(`${API}${path}`, { ...opts, headers: { ...headers, ...opts.headers } });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.detail || `Error ${res.status}`);
  return data;
}

// ─── Auth ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  document.getElementById("login-error").textContent = "";
  try {
    const data = await apiFetch("/auth/login", {
      method: "POST",
      body: JSON.stringify({
        email: document.getElementById("login-email").value,
        password: document.getElementById("login-password").value,
      }),
    });
    token = data.token;
    currentUser = data.user;
    localStorage.setItem("token", token);
    localStorage.setItem("user", JSON.stringify(currentUser));
    enterDashboard();
  } catch (e) {
    document.getElementById("login-error").textContent = e.message;
  }
}

async function doRegister() {
  document.getElementById("reg-error").textContent = "";
  try {
    await apiFetch("/auth/register", {
      method: "POST",
      body: JSON.stringify({
        name: document.getElementById("reg-name").value,
        email: document.getElementById("reg-email").value,
        password: document.getElementById("reg-password").value,
      }),
    });
    document.getElementById("login-email").value = document.getElementById("reg-email").value;
    document.getElementById("login-password").value = document.getElementById("reg-password").value;
    showPage("login-page");
    doLogin();
  } catch (e) {
    document.getElementById("reg-error").textContent = e.message;
  }
}

async function doLogout() {
  try { await apiFetch("/auth/logout", { method: "POST" }); } catch (_) {}
  token = null; currentUser = null;
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  disconnectWS();
  showPage("login-page");
}

// ─── Dashboard ───────────────────────────────────────────────────────────────
function enterDashboard() {
  document.getElementById("user-name-display").textContent = currentUser.name;
  showPage("dashboard-page");
  loadDocuments();
}

async function loadDocuments() {
  const list = document.getElementById("doc-list");
  try {
    const data = await apiFetch("/documents");
    if (data.documents.length === 0) {
      list.innerHTML = '<div style="color:#888;font-size:.9rem">No documents yet. Create one!</div>';
      return;
    }
    list.innerHTML = data.documents.map(d => `
      <div class="doc-card" onclick="openDocument(${d.id})">
        <div>
          <div class="doc-card-title">${esc(d.title)}</div>
          <div class="doc-card-meta">Updated ${new Date(d.updated_at).toLocaleString()}</div>
        </div>
        <div class="doc-card-actions" onclick="event.stopPropagation()">
          ${d.owner_id === currentUser.id ? `<button class="btn btn-sm btn-danger" onclick="deleteDoc(${d.id})">Delete</button>` : ''}
        </div>
      </div>
    `).join("");
  } catch (e) {
    list.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

function openNewDocModal() {
  document.getElementById("new-doc-title").value = "";
  document.getElementById("new-doc-error").textContent = "";
  openModal("new-doc-modal");
}

async function createDocument() {
  document.getElementById("new-doc-error").textContent = "";
  try {
    const doc = await apiFetch("/documents", {
      method: "POST",
      body: JSON.stringify({ title: document.getElementById("new-doc-title").value || "Untitled" }),
    });
    closeModal("new-doc-modal");
    openDocument(doc.id);
  } catch (e) {
    document.getElementById("new-doc-error").textContent = e.message;
  }
}

async function deleteDoc(id) {
  if (!confirm("Delete this document?")) return;
  try {
    await apiFetch(`/documents/${id}`, { method: "DELETE" });
    loadDocuments();
  } catch (e) {
    alert(e.message);
  }
}

// ─── Editor ──────────────────────────────────────────────────────────────────
async function openDocument(docId) {
  showPage("editor-page");
  currentDoc = null;
  currentDocRole = null;
  document.getElementById("editor-content").value = "";
  document.getElementById("editor-title").value = "";
  document.getElementById("active-users").innerHTML = "";
  document.getElementById("perm-list").innerHTML = "";
  document.getElementById("version-list").innerHTML = "";
  document.getElementById("perm-error").textContent = "";
  document.getElementById("add-perm-section").style.display = "none";
  document.getElementById("editor-status").textContent = "Connecting…";
  resetAIPanel();

  try {
    const doc = await apiFetch(`/documents/${docId}`);
    currentDoc = doc;
    document.getElementById("editor-title").value = doc.title;
    document.getElementById("editor-content").value = doc.content?.text || "";
    connectWS(docId);
    loadPermissions(docId);
    loadVersions(docId);
  } catch (e) {
    alert(e.message);
    showPage("dashboard-page");
  }
}

function goBack() {
  disconnectWS();
  showPage("dashboard-page");
  loadDocuments();
}

function connectWS(docId) {
  disconnectWS();
  const wsProto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${wsProto}://${location.host}/ws/documents/${docId}?token=${token}`);

  ws.onopen = () => { document.getElementById("editor-status").textContent = "Connected"; };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === "init") {
      currentDocRole = msg.role;
      const ta = document.getElementById("editor-content");
      ta.value = msg.content?.text || "";
      ta.disabled = !["editor", "owner"].includes(msg.role);
      renderActiveUsers(msg.active_users);
    } else if (msg.type === "update") {
      const ta = document.getElementById("editor-content");
      const incoming = msg.content?.text || "";
      if (ta.value !== incoming) {
        const sel = { s: ta.selectionStart, e: ta.selectionEnd };
        ta.value = incoming;
        try { ta.setSelectionRange(sel.s, sel.e); } catch(_) {}
      }
      document.getElementById("editor-status").textContent = `Updated by ${msg.user.name}`;
      setTimeout(() => { document.getElementById("editor-status").textContent = "Saved"; }, 2000);
    } else if (msg.type === "user_joined") {
      refreshActiveUsers(msg.user, true);
    } else if (msg.type === "user_left") {
      refreshActiveUsers(msg.user, false);
    }
  };

  ws.onclose = () => { document.getElementById("editor-status").textContent = "Disconnected"; };
  ws.onerror = () => { document.getElementById("editor-status").textContent = "Connection error"; };
}

function disconnectWS() {
  clearTimeout(wsReconnectTimer);
  if (ws) { ws.close(); ws = null; }
}

let activeUsers = [];
function renderActiveUsers(users) {
  activeUsers = users || [];
  document.getElementById("active-users").innerHTML = activeUsers.map(u =>
    `<div class="user-tag"><span class="user-dot"></span>${esc(u.name)} <span style="color:#aaa;font-size:.75rem">(${u.role})</span></div>`
  ).join("") || '<div style="color:#aaa;font-size:.85rem">Just you</div>';
}

function refreshActiveUsers(user, joined) {
  if (joined) {
    if (!activeUsers.find(u => u.id === user.id)) activeUsers.push(user);
  } else {
    activeUsers = activeUsers.filter(u => u.id !== user.id);
  }
  renderActiveUsers(activeUsers);
}

function onContentChange() {
  clearTimeout(saveTimer);
  document.getElementById("editor-status").textContent = "Typing…";
  saveTimer = setTimeout(broadcastUpdate, 600);
}

function broadcastUpdate(saveVer = false) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const content = { text: document.getElementById("editor-content").value };
  ws.send(JSON.stringify({ type: "update", content, save_version: saveVer }));
  document.getElementById("editor-status").textContent = "Saved";
}

function saveVersion() {
  broadcastUpdate(true);
  setTimeout(() => loadVersions(currentDoc.id), 500);
}

async function saveTitle() {
  if (!currentDoc) return;
  const title = document.getElementById("editor-title").value.trim();
  if (!title || title === currentDoc.title) return;
  try {
    await apiFetch(`/documents/${currentDoc.id}`, { method: "PUT", body: JSON.stringify({ title }) });
    currentDoc.title = title;
  } catch (e) { console.error(e); }
}

// ─── Permissions ─────────────────────────────────────────────────────────────
async function loadPermissions(docId) {
  try {
    const data = await apiFetch(`/documents/${docId}/permissions`);
    const list = document.getElementById("perm-list");
    const isOwner = currentDoc?.owner_id === currentUser.id;
    list.innerHTML = data.permissions.map(p => `
      <div class="perm-row">
        <span>${esc(p.user_name)}</span>
        <span class="perm-role">${p.role}</span>
        ${isOwner ? `
          <select onchange="updatePerm(${docId},${p.user_id},this.value)" style="font-size:.78rem;padding:.15rem .3rem">
            <option ${p.role==='editor'?'selected':''} value="editor">Editor</option>
            <option ${p.role==='commenter'?'selected':''} value="commenter">Commenter</option>
            <option ${p.role==='viewer'?'selected':''} value="viewer">Viewer</option>
          </select>
          <button class="btn btn-sm btn-danger" style="padding:.15rem .4rem;font-size:.75rem" onclick="revokePerm(${docId},${p.user_id})">✕</button>
        ` : ''}
      </div>
    `).join("") || '<div style="color:#aaa;font-size:.85rem">No shared users</div>';
    if (isOwner) document.getElementById("add-perm-section").style.display = "block";
  } catch (e) { console.error(e); }
}

let searchTimer = null;
async function searchUsers(q) {
  clearTimeout(searchTimer);
  const results = document.getElementById("user-search-results");
  if (!q || q.length < 2) { results.style.display = "none"; return; }
  searchTimer = setTimeout(async () => {
    try {
      const data = await apiFetch(`/auth/users/search?q=${encodeURIComponent(q)}`);
      results.innerHTML = data.users.length === 0
        ? '<div style="padding:.5rem;color:#aaa;font-size:.85rem">No users found</div>'
        : data.users.map(u =>
            `<div style="padding:.5rem .7rem;cursor:pointer;font-size:.85rem;border-bottom:1px solid #f0f0f0" onmousedown="selectUser(${u.id},'${esc(u.name)}','${esc(u.email)}')">${esc(u.name)} <span style="color:#aaa">${esc(u.email)}</span></div>`
          ).join("");
      results.style.display = "block";
    } catch(_) {}
  }, 300);
}

function selectUser(id, name, email) {
  document.getElementById("perm-user-id").value = id;
  document.getElementById("perm-search").value = "";
  document.getElementById("user-search-results").style.display = "none";
  document.getElementById("selected-user-label").textContent = `${name} (${email})`;
  document.getElementById("selected-user-display").style.display = "flex";
}

function clearSelectedUser() {
  document.getElementById("perm-user-id").value = "";
  document.getElementById("selected-user-display").style.display = "none";
  document.getElementById("perm-search").value = "";
}

async function grantPermission() {
  const docId = currentDoc.id;
  const userId = parseInt(document.getElementById("perm-user-id").value);
  const role = document.getElementById("perm-role").value;
  document.getElementById("perm-error").textContent = "";
  if (!userId) { document.getElementById("perm-error").textContent = "Search and select a user first"; return; }
  try {
    await apiFetch(`/documents/${docId}/permissions`, {
      method: "POST", body: JSON.stringify({ user_id: userId, role }),
    });
    clearSelectedUser();
    loadPermissions(docId);
  } catch (e) { document.getElementById("perm-error").textContent = e.message; }
}

async function updatePerm(docId, userId, role) {
  try {
    await apiFetch(`/documents/${docId}/permissions/${userId}`, {
      method: "PUT", body: JSON.stringify({ role }),
    });
    loadPermissions(docId);
  } catch (e) { alert(e.message); }
}

async function revokePerm(docId, userId) {
  if (!confirm("Remove this user's access?")) return;
  try {
    await apiFetch(`/documents/${docId}/permissions/${userId}`, { method: "DELETE" });
    loadPermissions(docId);
  } catch (e) { alert(e.message); }
}

// ─── Versions ────────────────────────────────────────────────────────────────
async function loadVersions(docId) {
  try {
    const data = await apiFetch(`/documents/${docId}/versions`);
    const list = document.getElementById("version-list");
    if (data.versions.length === 0) {
      list.innerHTML = '<div style="color:#aaa;font-size:.85rem">No saved versions</div>';
      return;
    }
    list.innerHTML = data.versions.map(v => `
      <div class="version-row">
        <span>v${v.version_number} — ${new Date(v.created_at).toLocaleTimeString()}</span>
        <button class="btn btn-sm" style="font-size:.75rem;padding:.15rem .4rem" onclick="restoreVersion(${docId},${v.version_number})">Restore</button>
      </div>
    `).join("");
  } catch (e) { console.error(e); }
}

async function restoreVersion(docId, versionNumber) {
  if (!confirm(`Restore to version ${versionNumber}?`)) return;
  try {
    const data = await apiFetch(`/documents/${docId}/versions/restore/${versionNumber}`, { method: "POST" });
    document.getElementById("editor-content").value = data.document.content?.text || "";
    broadcastUpdate();
    loadVersions(docId);
  } catch (e) { alert(e.message); }
}

// ─── AI Assistant ─────────────────────────────────────────────────────────────
let aiSelectedText = "";
let aiSelectionStart = 0;
let aiSelectionEnd = 0;
let aiSuggestion = "";

const ACTION_LABELS = {
  rewrite: "Rewrite",
  summarize: "Summarize",
  translate: "Translate",
  restructure: "Restructure",
};

function resetAIPanel() {
  aiSelectedText = "";
  aiSuggestion = "";
  document.getElementById("ai-idle").style.display = "block";
  document.getElementById("ai-selection-preview").style.display = "none";
  document.getElementById("ai-loading").style.display = "none";
  document.getElementById("ai-result").style.display = "none";
  document.getElementById("ai-error").style.display = "none";
}

function checkAISelection() {
  const ta = document.getElementById("editor-content");
  if (!ta || ta.disabled) return;
  const s = ta.selectionStart;
  const e = ta.selectionEnd;

  if (s === e) {
    // Deselected — only reset if no result is showing
    if (document.getElementById("ai-result").style.display === "none" &&
        document.getElementById("ai-loading").style.display === "none") {
      resetAIPanel();
    }
    return;
  }

  aiSelectedText = ta.value.substring(s, e);
  aiSelectionStart = s;
  aiSelectionEnd = e;

  const wordCount = aiSelectedText.trim().split(/\s+/).filter(Boolean).length;
  document.getElementById("ai-selection-text").textContent = aiSelectedText;
  document.getElementById("ai-word-count").textContent = `${wordCount} word${wordCount !== 1 ? "s" : ""}`;

  document.getElementById("ai-idle").style.display = "none";
  document.getElementById("ai-selection-preview").style.display = "block";
  document.getElementById("ai-loading").style.display = "none";
  document.getElementById("ai-result").style.display = "none";
  document.getElementById("ai-error").style.display = "none";

  // Re-enable action buttons in case they were disabled
  document.getElementById("ai-action-grid").querySelectorAll("button").forEach(b => b.disabled = false);
}

async function callAI(action) {
  if (!aiSelectedText || !currentDoc) return;

  document.getElementById("ai-loading-label").textContent = `${ACTION_LABELS[action] || action}…`;
  document.getElementById("ai-loading").style.display = "block";
  document.getElementById("ai-result").style.display = "none";
  document.getElementById("ai-error").style.display = "none";
  document.getElementById("ai-action-grid").querySelectorAll("button").forEach(b => b.disabled = true);

  try {
    const ta = document.getElementById("editor-content");
    const data = await apiFetch(`/documents/${currentDoc.id}/ai/assist`, {
      method: "POST",
      body: JSON.stringify({
        selected_text: aiSelectedText,
        action,
        context: ta.value.substring(0, 500),
      }),
    });
    aiSuggestion = data.suggestion;
    document.getElementById("ai-result-badge").textContent = ACTION_LABELS[action] || action;
    document.getElementById("ai-suggestion-text").textContent = aiSuggestion;
    document.getElementById("ai-result").style.display = "block";
  } catch (e) {
    document.getElementById("ai-error").textContent = "Error: " + e.message;
    document.getElementById("ai-error").style.display = "block";
    // Restore selection preview so user can try again
    document.getElementById("ai-action-grid").querySelectorAll("button").forEach(b => b.disabled = false);
  } finally {
    document.getElementById("ai-loading").style.display = "none";
  }
}

function acceptAI() {
  if (!aiSuggestion) return;
  const ta = document.getElementById("editor-content");
  ta.value = ta.value.substring(0, aiSelectionStart) + aiSuggestion + ta.value.substring(aiSelectionEnd);
  aiSelectionEnd = aiSelectionStart + aiSuggestion.length;
  aiSuggestion = "";
  onContentChange();
  resetAIPanel();
}

function rejectAI() {
  aiSuggestion = "";
  // Go back to showing the selection (it may have changed, so just reset)
  resetAIPanel();
}

// ─── Init ────────────────────────────────────────────────────────────────────
if (token && currentUser) {
  enterDashboard();
} else {
  showPage("login-page");
}
</script>
